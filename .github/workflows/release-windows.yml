name: Build Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v1.0.1"
        required: true
        default: "v1.0.1"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        shell: pwsh
        run: |
          python -m pip install --upgrade pip --timeout 60 --retries 3
          python -m pip install pyinstaller --timeout 60 --retries 3 -i https://pypi.tuna.tsinghua.edu.cn/simple
          if ($LASTEXITCODE -ne 0) {
            python -m pip install pyinstaller --timeout 60 --retries 3
          }
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Build exe
        working-directory: excel
        run: >
          python -m PyInstaller
          --noconfirm
          --clean
          --onefile
          --windowed
          --name "fund-flow-analyst"
          fund_flow_app.py

      - name: Package zip
        shell: pwsh
        run: |
          $packageDir = "release-package"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item "excel\dist\fund-flow-analyst.exe" "$packageDir\fund-flow-analyst.exe"
          Copy-Item "excel\README.md" "$packageDir\README.md"
          Copy-Item "excel\sample_transactions.csv" "$packageDir\sample_transactions.csv"
          Compress-Archive -Path "$packageDir\*" -DestinationPath "fund-flow-analyst-windows.zip" -Force

      - name: Resolve release tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "RELEASE_TAG=${{ inputs.version }}" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
            "RELEASE_TAG=${{ github.ref_name }}" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$env:RELEASE_TAG" 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create "$env:RELEASE_TAG" "fund-flow-analyst-windows.zip" --title "fund-flow-analyst $env:RELEASE_TAG" --notes "Download fund-flow-analyst-windows.zip, unzip it, then run fund-flow-analyst.exe. Do not download Source code zip."
          } else {
            gh release upload "$env:RELEASE_TAG" "fund-flow-analyst-windows.zip" --clobber
          }
